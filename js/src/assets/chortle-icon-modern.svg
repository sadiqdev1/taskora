<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <!-- Premium gradient -->
    <linearGradient id="premiumGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main shape with shadow -->
  <g filter="url(#shadow)">
    <rect width="48" height="48" rx="12" fill="url(#premiumGradient)"/>
  </g>
  
  <!-- Abstract smile - modern geometric -->
  <path d="M 14 26 Q 24 36 34 26" 
        stroke="white" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"
        opacity="0.95"/>
  
  <!-- Minimalist eyes - rounded rectangles for modern look -->
  <rect x="16" y="16" width="4" height="4" rx="2" fill="white" opacity="0.95"/>
  <rect x="28" y="16" width="4" height="4" rx="2" fill="white" opacity="0.95"/>
  
  <!-- Subtle highlight for depth -->
  <path d="M 12 12 Q 24 8 36 12" 
        stroke="white" 
        stroke-width="1.5" 
        stroke-linecap="round"
        opacity="0.15"/>
</svg>
