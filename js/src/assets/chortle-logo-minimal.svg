<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Rounded square -->
  <rect width="48" height="48" rx="12" fill="#F97316"/>
  
  <!-- Ultra minimal smile - just an arc -->
  <path d="M 12 22 Q 24 36 36 22" 
        stroke="white" 
        stroke-width="5" 
        stroke-linecap="round" 
        fill="none"/>
  
  <!-- Minimal eyes - just two lines -->
  <line x1="16" y1="14" x2="16" y2="18" 
        stroke="white" 
        stroke-width="4" 
        stroke-linecap="round"/>
  <line x1="32" y1="14" x2="32" y2="18" 
        stroke="white" 
        stroke-width="4" 
        stroke-linecap="round"/>
</svg>
