<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon part -->
  <rect x="4" y="4" width="40" height="40" rx="10" fill="url(#logoGradient)"/>
  
  <!-- Smile -->
  <path d="M 14 24 Q 24 34 34 24" 
        stroke="white" 
        stroke-width="2.6" 
        stroke-linecap="round" 
        fill="none"/>
  
  <!-- Eyes -->
  <circle cx="18" cy="18" r="2" fill="white"/>
  <circle cx="30" cy="18" r="2" fill="white"/>
  
  <!-- Sparkle -->
  <circle cx="38" cy="10" r="1.3" fill="#fbbf24" opacity="0.8"/>
  
  <!-- Text "Chortle" -->
  <text x="54" y="32" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="24" 
        font-weight="700" 
        fill="#1f2937"
        letter-spacing="-0.5">
    Chortle
  </text>
</svg>
